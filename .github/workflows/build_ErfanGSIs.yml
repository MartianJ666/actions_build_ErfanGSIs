  name: build_ErfanGSIs

  on:
    watch:
      types: [started]

  env:
    ROM_URL: "https://bigota.d.miui.com/V12.0.2.0.QGGCNXM/begonia_images_V12.0.2.0.QGGCNXM_20200710.0000.00_10.0_cn_83e8f9a4db.tgz"
    ROM_NAME: "MIUI"
    BUILD_TYPE: "aonly"
    TZ: "Asia/Shanghai"

  jobs:
    build:
      runs-on: "ubuntu-22.04"
      if: ${{ github.event.repository.owner.id == github.event.sender.id }}

      steps:
         - name: Checkout
           uses: actions/checkout@master

         - name: Initialization environment
           run: |
              sudo apt-get update
              sudo apt-get install -y git wget python3-pip

         - name: Clone ErfanGSI Source Code
           run: git clone --recurse-submodules https://github.com/erfanoabdi/ErfanGSIs.git ErfanGSIs

         - name: Install pip
           run: sudo python3 -m pip install --upgrade pip

         - name: Fix exit
           run: |
                sed -i 's/\|\| exit 1//g' $GITHUB_WORKSPACE/ErfanGSIs/url2GSI.sh
                sed -i 's/exit 1//g' $GITHUB_WORKSPACE/ErfanGSIs/url2GSI.sh

         - name: Setting up ErfanGSI requirements
           run: |
                cd $GITHUB_WORKSPACE/ErfanGSIs
                mkdir -p ./output
                sudo bash ./setup.sh

         - name: Download Stock Rom & Generate GSI
           run: |
                cd $GITHUB_WORKSPACE/ErfanGSIs
                if [ "$BUILD_TYPE" = "ab" ]; then
                  sudo bash ./url2GSI.sh -c --ab $ROM_URL $ROM_NAME
                else
                  sudo bash ./url2GSI.sh -c $ROM_URL $ROM_NAME
                fi

         - name: Zip GSI
           run: |
                cd $GITHUB_WORKSPACE/ErfanGSIs/output
                mkdir -p final
                zip -r final/GSI.zip ./*

         - name: Upload GSI as Artifact
           uses: actions/upload-artifact@v4
           with:
             name: GSI-Aonly
             path: /home/runner/work/actions_build_ErfanGSIs/actions_build_ErfanGSIs/ErfanGSIs/output/final/GSI.zip
